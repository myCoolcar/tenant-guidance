<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tenant Letter Generator</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f7fa;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
color:#2c3e50;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#2c7be5;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1a5fcc;
}

#explanation{
margin-top:15px;
padding:12px;
background:#eef4ff;
border-left:5px solid #2c7be5;
display:none;
}

#preview{
margin-top:25px;
padding:20px;
background:#fafafa;
border:1px solid #ddd;
white-space:pre-wrap;
}

.download-buttons{
margin-top:20px;
}

footer{
margin-top:40px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Tenant Letter Generator</h1>

<p>This tool helps tenants create formal letters to landlords or letting agents regarding common housing issues.</p>

<label>Your Name</label>
<input id="tenantName" placeholder="Your name">

<label>Landlord / Letting Agent Name</label>
<input id="landlordName" placeholder="Landlord or Agency">

<label>Select Issue</label>
<select id="issueSelect" onchange="showExplanation()">
<option value="">Select an issue</option>
<option value="repairs">Failure to carry out repairs</option>
<option value="improperAccess">Improper property access</option>
<option value="deposit">Deposit not returned</option>
<option value="harassment">Harassment or intimidation</option>
<option value="eviction">Unlawful eviction concerns</option>
</select>

<div id="explanation"></div>

<button onclick="generateLetter()">Generate Letter</button>

<div id="preview"></div>

<div class="download-buttons" id="downloads" style="display:none;">
<button onclick="downloadDoc()">Download .DOC</button>
<button onclick="downloadEmail()">Download Email Draft</button>
</div>

<footer>
This tool provides general information only and should not be considered legal advice.
</footer>

</div>

<script>

const explanations = {

repairs: "Use this letter when your landlord has failed to carry out necessary repairs after being notified. Landlords have a legal duty under housing law to maintain the structure, exterior, and essential services of a property.",

improperAccess: "Use this letter when a landlord or agent enters your home without proper notice or permission. Tenants have the legal right to 'quiet enjoyment', meaning landlords must usually give at least 24 hours notice before entry.",

deposit: "Use this letter if your tenancy deposit has not been returned or properly accounted for. Deposits must normally be protected in a government approved scheme and returned promptly after the tenancy ends.",

harassment: "Use this letter if you are experiencing harassment, intimidation, or pressure from your landlord. It is unlawful for landlords to harass tenants or attempt to force them to leave without following legal eviction procedures.",

eviction: "Use this letter if you believe a landlord may be attempting an unlawful eviction. Tenants can usually only be evicted through a legal court process."

}

function showExplanation(){

const issue = document.getElementById("issueSelect").value
const box = document.getElementById("explanation")

if(issue){
box.style.display = "block"
box.innerText = explanations[issue]
}else{
box.style.display = "none"
}

}

let generatedLetter = ""

function generateLetter(){

const tenant = document.getElementById("tenantName").value
const landlord = document.getElementById("landlordName").value
const issue = document.getElementById("issueSelect").value

if(!tenant || !landlord || !issue){
alert("Please complete all fields.")
return
}

const date = new Date().toLocaleDateString()

let body = ""

if(issue === "repairs"){

body = `I am writing to formally notify you that repairs at my rented property remain outstanding.

Under landlord obligations relating to property maintenance, essential repairs must be addressed within a reasonable timeframe. Despite previous communication, the issue has not yet been resolved.

Please confirm when these repairs will be completed.

I hope we can resolve this matter promptly.`

}

if(issue === "improperAccess"){

body = `I am writing regarding entry to my home without proper notice.

Tenants are entitled to quiet enjoyment of their home, and landlords must normally provide at least 24 hours notice before entering except in genuine emergencies.

Please ensure that future access requests follow the appropriate notice procedures.`

}

if(issue === "deposit"){

body = `I am writing regarding the return of my tenancy deposit.

Deposits should be returned promptly at the end of a tenancy unless legitimate deductions are clearly explained. Please confirm the status of my deposit and provide details of any deductions.`

}

if(issue === "harassment"){

body = `I am writing to formally raise concerns about behaviour that I believe constitutes harassment.

Tenants have legal protection against harassment or pressure to leave a property outside the proper legal process. I ask that all communication and actions regarding my tenancy remain lawful and respectful.`

}

if(issue === "eviction"){

body = `I am writing to clarify the legal process regarding my tenancy.

Eviction must follow the correct legal procedures and normally requires appropriate notice and court involvement. I ask that any further actions comply with the legal requirements for tenancy termination.`

}

generatedLetter =

`${tenant}
[Your Address]

${date}

To: ${landlord}

Dear ${landlord},

${body}

Sincerely,

${tenant}`

document.getElementById("preview").innerText = generatedLetter
document.getElementById("downloads").style.display = "block"

}

function downloadDoc(){

const blob = new Blob([generatedLetter], {type: "application/msword"})
const link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = "tenant_letter.doc"
link.click()

}

function downloadEmail(){

const subject = encodeURIComponent("Tenant Letter Regarding Housing Issue")
const body = encodeURIComponent(generatedLetter)

const emailContent =
`Subject: Tenant Letter Regarding Housing Issue

${generatedLetter}`

const blob = new Blob([emailContent], {type:"message/rfc822"})
const link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = "tenant_letter.eml"
link.click()

}

</script>

</body>
</html>
