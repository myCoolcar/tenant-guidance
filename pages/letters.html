<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter Generator - Tenant Advocate</title>

<link rel="stylesheet" href="../styles.css">

<style>

.generator{
max-width:900px;
margin:auto;
padding:20px;
}

.explanation{
background:#eef4ff;
border-left:5px solid #2c7be5;
padding:15px;
margin-top:15px;
}

.warning{
background:#fff3cd;
border-left:5px solid #ffc107;
padding:15px;
margin-top:15px;
}

textarea{
width:100%;
height:260px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>Tenant Advocate</h1>
<p>Helping tenants understand their rights and document housing disputes</p>
</header>

<nav>
<a href="../index.html">Home</a>
<a href="../sitemap.html">Sitemap</a>
<a href="know-your-rights.html">Know Your Rights</a>
<a href="repairs.html">Repairs</a>
<a href="deposits.html">Deposits</a>
<a href="fees.html">Fees</a>
<a href="evictions.html">Evictions</a>
<a href="timeline-tool.html">Timeline Tool</a>
<a href="letters.html">Letters</a>
<a href="resources.html">Resources</a>
</nav>

<div class="generator">

<h2>Tenant Letter Generator</h2>

<label>Your Name</label>
<input id="tenantName">

<label>Landlord / Letting Agent</label>
<input id="landlordName">

<label>Select Issue</label>

<select id="issueSelect" onchange="showQuestions()">

<option value="">Select issue</option>

<option value="repairs">Repairs not completed</option>

<option value="access">Improper property access</option>

<option value="deposit">Deposit not protected</option>

<option value="fees">Illegal tenant fees</option>

</select>

<div id="explanation" class="explanation"></div>

<div id="questions"></div>

<div id="warningBox" class="warning" style="display:none"></div>

<button onclick="generateLetter()">Generate Letter</button>

<textarea id="preview"></textarea>

<button onclick="downloadDoc()">Download .DOC</button>

<button onclick="generateEmail()">Create Email</button>

<div id="legalBasis"></div>

</div>

<script>

function showQuestions(){

let issue = document.getElementById("issueSelect").value
let questions = document.getElementById("questions")
let explanation = document.getElementById("explanation")

questions.innerHTML=""

if(issue==="repairs"){

explanation.innerHTML =
"<strong>Legal basis:</strong> Section 11 of the Landlord and Tenant Act 1985. Landlords must maintain the structure of the property and key installations such as heating, water and electricity."

questions.innerHTML = `

<label>Have you already reported the repair to the landlord?</label>

<select id="repairReported">

<option value="no">No</option>

<option value="yes">Yes</option>

</select>

<label>How long ago did you report it?</label>

<select id="repairDelay">

<option value="fewDays">Less than 7 days</option>

<option value="week">7-14 days</option>

<option value="long">More than 14 days</option>

</select>
`
}

if(issue==="access"){

explanation.innerHTML =
"<strong>Legal principle:</strong> Tenants have the right to 'quiet enjoyment'. Landlords must normally give at least 24 hours notice before entering the property except in emergencies."

questions.innerHTML = `

<label>Did the landlord give at least 24 hours notice?</label>

<select id="notice">

<option value="yes">Yes</option>

<option value="no">No</option>

</select>
`
}

if(issue==="deposit"){

explanation.innerHTML =
"<strong>Legal basis:</strong> Housing Act 2004. Deposits must be protected in an approved tenancy deposit scheme within 30 days."

questions.innerHTML = `

<label>Was your deposit protected within 30 days?</label>

<select id="depositProtected">

<option value="no">No</option>

<option value="unknown">Unsure</option>

<option value="yes">Yes</option>

</select>
`
}

if(issue==="fees"){

explanation.innerHTML =
"<strong>Legal basis:</strong> Tenant Fees Act 2019. Most fees charged to tenants are prohibited."

questions.innerHTML = `

<label>What type of fee were you charged?</label>

<select id="feeType">

<option value="admin">Admin or application fee</option>

<option value="reference">Referencing fee</option>

<option value="other">Other fee</option>

</select>
`
}

}

function generateLetter(){

let tenant=document.getElementById("tenantName").value
let landlord=document.getElementById("landlordName").value
let issue=document.getElementById("issueSelect").value

let warningBox=document.getElementById("warningBox")

warningBox.style.display="none"

let today=new Date().toLocaleDateString()

let body=""

if(issue==="access"){

let notice=document.getElementById("notice").value

if(notice==="yes"){

warningBox.style.display="block"

warningBox.innerHTML =
"The landlord appears to have provided the usual 24 hours notice before entry. This generally complies with tenancy law, so a complaint letter may not be appropriate."

document.getElementById("preview").value=""

return

}

body=`I am writing regarding entry to the property without sufficient notice.

Tenants are entitled to quiet enjoyment of their home and landlords should normally provide at least 24 hours notice before entering unless there is an emergency.`

}

if(issue==="repairs"){

let reported=document.getElementById("repairReported").value
let delay=document.getElementById("repairDelay").value

if(reported==="no"){

body=`I am writing to notify you of a repair issue at the property.

Under Section 11 of the Landlord and Tenant Act 1985 landlords are responsible for maintaining the structure of the property and essential services.`

}

if(reported==="yes" && delay==="fewDays"){

warningBox.style.display="block"

warningBox.innerHTML =
"The repair was reported recently. Landlords must be given a reasonable amount of time to arrange repairs."

return

}

if(reported==="yes" && delay!=="fewDays"){

body=`I previously reported a repair issue which remains unresolved.

Under Section 11 of the Landlord and Tenant Act 1985 landlords are responsible for maintaining the property and carrying out necessary repairs within a reasonable time.`

}

}

if(issue==="deposit"){

let deposit=document.getElementById("depositProtected").value

if(deposit==="yes"){

warningBox.style.display="block"

warningBox.innerHTML =
"If your deposit was protected correctly, a complaint letter may not be necessary."

return

}

body=`I am writing regarding my tenancy deposit.

Under the Housing Act 2004 landlords must protect deposits within 30 days in an approved scheme.`

}

if(issue==="fees"){

body=`I am writing regarding a fee that I believe may not be permitted.

Under the Tenant Fees Act 2019 most fees charged to tenants are prohibited.`

}

let letter=`${today}

Dear ${landlord},

${body}

Please respond in writing.

Kind regards,

${tenant}`

document.getElementById("preview").value=letter

}

function downloadDoc(){

let text=document.getElementById("preview").value

let blob=new Blob([text],{type:"application/msword"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="tenant_letter.doc"

link.click()

}

function generateEmail(){

let text=encodeURIComponent(document.getElementById("preview").value)

window.location.href="mailto:?subject=Tenant Request&body="+text

}

</script>

</body>
</html>
