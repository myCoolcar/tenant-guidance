<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tenant Letter Generator</title>

<link rel="stylesheet" href="../styles.css">

<style>

.generator{
max-width:900px;
margin:auto;
padding:20px;
}

.explanation{
background:#eef4ff;
border-left:5px solid #2c7be5;
padding:15px;
margin-top:15px;
}

.warning{
background:#fff3cd;
border-left:5px solid #ffcc00;
padding:15px;
margin-top:15px;
}

textarea{
width:100%;
height:260px;
margin-top:20px;
}

button{
margin-top:10px;
padding:10px 16px;
}

</style>

</head>

<body>

<header>
<h1>Tenant Advocate</h1>
<p>Helping tenants understand their rights and document housing disputes</p>
</header>

<nav>

<a href="../index.html">Home</a>
<a href="../sitemap.html">Sitemap</a>
<a href="know-your-rights.html">Know Your Rights</a>
<a href="repairs.html">Repairs</a>
<a href="deposits.html">Deposits</a>
<a href="fees.html">Fees</a>
<a href="evictions.html">Evictions</a>
<a href="timeline-tool.html">Timeline Tool</a>
<a href="letters.html">Letters</a>
<a href="resources.html">Resources</a>

</nav>

<div class="generator">

<h2>Tenant Letter Generator</h2>

<p>
Answer a few questions to generate a letter grounded in housing legislation.
</p>

<label>Your Name</label>
<input id="tenantName">

<label>Landlord / Letting Agent</label>
<input id="landlordName">

<label>Select Issue</label>

<select id="issueSelect" onchange="showQuestions()">

<option value="">Select issue</option>

<option value="repairs">Repairs not carried out</option>
<option value="deposit">Deposit issue</option>
<option value="fees">Illegal tenant fees</option>
<option value="access">Improper access</option>
<option value="harassment">Harassment by landlord</option>
<option value="eviction">Unlawful eviction concerns</option>

</select>

<div id="explanation" class="explanation"></div>

<div id="questions"></div>

<div id="warningBox" class="warning" style="display:none"></div>

<button onclick="generateLetter()">Generate Letter</button>

<textarea id="preview"></textarea>

<button onclick="downloadDoc()">Download .DOC</button>

<button onclick="generateEmail()">Create Email</button>

<div id="legalBasis"></div>

</div>

<script>

function showQuestions(){

let issue=document.getElementById("issueSelect").value
let q=document.getElementById("questions")
let exp=document.getElementById("explanation")

q.innerHTML=""

if(issue==="repairs"){

exp.innerHTML="<strong>Legal basis:</strong> Section 11 of the Landlord and Tenant Act 1985 requires landlords to maintain structure and key installations."

q.innerHTML=`

<label>Have you reported the repair?</label>
<select id="repairReported">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<label>How long since reporting?</label>
<select id="repairDelay">
<option value="recent">Less than 7 days</option>
<option value="medium">7–14 days</option>
<option value="long">More than 14 days</option>
</select>
`
}

if(issue==="deposit"){

exp.innerHTML="<strong>Legal basis:</strong> Housing Act 2004 requires deposits to be protected within 30 days."

q.innerHTML=`

<label>Was your deposit protected?</label>
<select id="depositStatus">
<option value="unknown">Unsure</option>
<option value="notProtected">No</option>
<option value="notReturned">Protected but not returned</option>
</select>
`
}

if(issue==="fees"){

exp.innerHTML="<strong>Legal basis:</strong> Tenant Fees Act 2019 bans most fees charged to tenants."

q.innerHTML=`

<label>What type of fee were you charged?</label>
<select id="feeType">
<option value="admin">Admin or application fee</option>
<option value="reference">Reference fee</option>
<option value="other">Other fee</option>
</select>
`
}

if(issue==="access"){

exp.innerHTML="<strong>Legal principle:</strong> Tenants have the right to quiet enjoyment. Landlords normally must give 24 hours notice before entry."

q.innerHTML=`

<label>Did the landlord give 24 hours notice?</label>
<select id="notice">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
`
}

if(issue==="harassment"){

exp.innerHTML="<strong>Legal basis:</strong> Protection from Eviction Act 1977 prohibits landlord harassment."

q.innerHTML=`

<label>What behaviour occurred?</label>
<select id="harassmentType">
<option value="threats">Threats or intimidation</option>
<option value="repeatedVisits">Repeated unwanted visits</option>
<option value="pressure">Pressure to leave property</option>
</select>
`
}

if(issue==="eviction"){

exp.innerHTML="<strong>Legal basis:</strong> Evictions normally require legal notice and court process."

q.innerHTML=`

<label>Has the landlord tried to remove you without a court order?</label>
<select id="evictionAttempt">
<option value="yes">Yes</option>
<option value="threat">Threatened eviction</option>
<option value="no">No</option>
</select>
`
}

}

function generateLetter(){

let tenant=document.getElementById("tenantName").value
let landlord=document.getElementById("landlordName").value
let issue=document.getElementById("issueSelect").value
let warning=document.getElementById("warningBox")

warning.style.display="none"

let today=new Date().toLocaleDateString()

let body=""

if(issue==="access"){

let notice=document.getElementById("notice").value

if(notice==="yes"){

warning.style.display="block"

warning.innerHTML="The landlord appears to have provided proper notice."

return

}

body="I am writing regarding entry to the property without the usual 24 hours notice required for tenant privacy."

}

if(issue==="repairs"){

let reported=document.getElementById("repairReported").value
let delay=document.getElementById("repairDelay").value

if(reported==="no"){

body="I am writing to formally notify you of a repair issue at the property."

}

if(reported==="yes" && delay==="recent"){

warning.style.display="block"
warning.innerHTML="The repair was reported recently and landlords should be given reasonable time."

return

}

if(reported==="yes" && delay!=="recent"){

body="I previously reported a repair issue which remains unresolved."

}

}

if(issue==="deposit"){

body="I am writing regarding my tenancy deposit and request confirmation of protection or its return."

}

if(issue==="fees"){

body="I am writing regarding a fee I believe may not be permitted under tenant fee regulations."

}

if(issue==="harassment"){

body="I am writing regarding behaviour which may constitute harassment under housing law."

}

if(issue==="eviction"){

body="I am writing to clarify the legal process regarding eviction and to ensure all procedures comply with housing law."

}

let letter=`${today}

Dear ${landlord},

${body}

Please respond in writing.

Kind regards,

${tenant}`

document.getElementById("preview").value=letter

}

function downloadDoc(){

let text=document.getElementById("preview").value

let blob=new Blob([text],{type:"application/msword"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="tenant_letter.doc"

link.click()

}

function generateEmail(){

let text=encodeURIComponent(document.getElementById("preview").value)

window.location.href="mailto:?subject=Tenant Letter&body="+text

}

</script>

</body>

</html>
